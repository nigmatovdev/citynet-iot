<mat-sidenav-container class="h-screen w-full bg-gray-50/50 dark:bg-zinc-950/80" [class.citynet-dark]="themeService.isDarkMode()" autosize>

    <!-- Side Navigation -->
    <mat-sidenav #sidenav mode="side" opened
        class="w-72 border-r border-gray-200/50 dark:border-zinc-800/50 bg-white/70 dark:bg-zinc-950/70 backdrop-blur-xl shadow-[4px_0_24px_rgba(0,0,0,0.02)] pt-2 relative z-20">
        
        <div class="h-20 flex items-center px-8 border-b border-gray-200/50 dark:border-zinc-800/50">
            <div class="h-10 w-10 bg-gradient-to-br from-emerald-400 to-cyan-500 rounded-xl shadow-lg shadow-emerald-500/30 mr-4 flex items-center justify-center text-white">
                <mat-icon class="transform scale-90">sensors</mat-icon>
            </div>
            <h1 class="text-2xl font-bold tracking-tight m-0 text-gray-900 dark:text-gray-100">
                CityNet<span class="text-emerald-500 dark:text-emerald-400 font-light">IoT</span>
            </h1>
        </div>

        <mat-nav-list class="pt-6 px-4 space-y-1">
            @for (item of menuItems; track item.label) {
            <a mat-list-item [routerLink]="item.route"
                class="rounded-xl mb-1 h-12 transition-all duration-300 group hover:bg-gray-100/80 dark:hover:bg-zinc-800/50"
                routerLinkActive="bg-gradient-to-r from-emerald-50 font-semibold to-transparent dark:from-emerald-900/30 text-emerald-600 dark:text-emerald-400 shadow-[inset_3px_0_0_0_rgba(16,185,129,1)]">
                <mat-icon matListItemIcon class="mr-4 text-gray-400 group-hover:text-emerald-500 transition-colors [routerLinkActive]='text-emerald-500'">{{ item.icon }}</mat-icon>
                <span matListItemTitle class="tracking-wide text-[15px]">{{ item.label }}</span>
            </a>
            }
        </mat-nav-list>

        <!-- Sidebar Background Glow -->
        <div class="absolute bottom-0 left-0 right-0 h-64 bg-gradient-to-t from-emerald-500/5 dark:from-emerald-500/10 to-transparent pointer-events-none"></div>
    </mat-sidenav>

    <!-- Main Content Area -->
    <mat-sidenav-content class="flex flex-col h-full overflow-hidden bg-transparent">

        <!-- Top Toolbar -->
        <mat-toolbar
            class="h-20 border-b border-gray-200/50 dark:border-zinc-800/50 bg-white/60 dark:bg-zinc-950/60 backdrop-blur-lg text-gray-800 dark:text-gray-200 flex justify-between shadow-[0_4px_30px_rgba(0,0,0,0.03)] z-10 sticky top-0 px-8 transition-colors">
            
            <div class="flex items-center gap-4">
                <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle sidenav" class="hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors rounded-full">
                    <mat-icon>menu</mat-icon>
                </button>
                <div class="hidden md:block h-6 w-[1px] bg-gray-300 dark:bg-zinc-700 mx-2"></div>
                <h2 class="text-lg font-medium text-gray-600 dark:text-gray-300 hidden md:inline-block tracking-wide">Platform Dashboard</h2>
            </div>

            <div class="flex items-center space-x-3">

                <!-- Theme Toggle -->
                <button mat-icon-button (click)="toggleTheme()" matTooltip="Toggle theme" class="hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors rounded-full text-gray-500 dark:text-gray-400">
                    <mat-icon class="transition-transform hover:rotate-12">{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
                </button>

                <!-- Notifications -->
                <button mat-icon-button aria-label="Notifications" class="relative hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors rounded-full text-gray-500 dark:text-gray-400">
                    <mat-icon>notifications</mat-icon>
                    <span
                        class="absolute top-2 right-2 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-white dark:border-zinc-900 shadow-[0_0_8px_rgba(244,63,94,0.8)] animate-pulse"></span>
                </button>

                <!-- User Menu -->
                <div class="pl-2 ml-2 border-l border-gray-200 dark:border-zinc-800 h-10 flex items-center">
                    <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User account" class="w-10 h-10 ring-2 ring-transparent hover:ring-emerald-500/50 transition-all rounded-full overflow-hidden">
                        <div
                            class="h-full w-full bg-gradient-to-br from-emerald-100 to-emerald-200 dark:from-emerald-900/50 dark:to-emerald-800/50 text-emerald-700 dark:text-emerald-300 flex items-center justify-center font-bold text-[15px] shadow-inner">
                            A
                        </div>
                    </button>
                    <mat-menu #userMenu="matMenu" class="mt-2 rounded-xl shadow-xl dark:bg-zinc-900 border border-gray-100 dark:border-zinc-800 py-2">
                        <button mat-menu-item routerLink="/profile" class="hover:bg-gray-50 dark:hover:bg-zinc-800 px-6">
                            <mat-icon class="text-gray-400 dark:text-zinc-500">person</mat-icon>
                            <span class="font-medium">Profile</span>
                        </button>
                        <mat-divider class="my-2 opacity-50"></mat-divider>
                        <button mat-menu-item (click)="logout()" class="hover:bg-rose-50 dark:hover:bg-rose-900/10 text-rose-600 dark:text-rose-400 px-6">
                            <mat-icon class="text-rose-500">logout</mat-icon>
                            <span class="font-medium">Sign out</span>
                        </button>
                    </mat-menu>
                </div>
            </div>
        </mat-toolbar>

        <!-- Page Content Router -->
        <main class="flex-1 overflow-auto p-4 md:p-8 lg:p-10 relative flex flex-col [&>*]:flex-1 bg-gradient-to-br from-transparent to-gray-50/50 dark:to-zinc-950/50">
            <router-outlet></router-outlet>
        </main>

    </mat-sidenav-content>
</mat-sidenav-container>
