<div class="relative w-full flex-1 bg-[var(--sys-surface)] text-[var(--sys-on-surface)] overflow-hidden">

    <!-- Top Bar inside Map -->
    <div class="absolute top-6 left-6 z-10 w-full pr-12 pointer-events-none flex justify-between items-start">
        <div
            class="bg-white/90 dark:bg-zinc-900/90 backdrop-blur border border-gray-200 dark:border-zinc-800 rounded-xl px-5 py-3 shadow-lg pointer-events-auto transition-colors">
            <h1 class="text-xl font-bold text-gray-900 dark:text-white">Live Operations Map</h1>
            <p class="text-sm text-gray-500 dark:text-zinc-400">Real-time geospatial state of {{ devices().length }}
                deployments</p>
        </div>

        <button (click)="findMyLocation()"
            class="mr-6 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl shadow-lg pointer-events-auto flex items-center gap-2 font-medium transition-colors">
            <span class="material-icons text-[20px]">my_location</span>
            Find My Location
        </button>
    </div>

    <!-- Map Canvas -->
    <div class="absolute inset-0 z-0">
        <div #map class="absolute inset-0 w-full h-full touch-none"></div>
    </div>
</div>
